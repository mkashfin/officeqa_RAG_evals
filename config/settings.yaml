# Treasury RAG System Configuration

data:
  repo_url: "https://github.com/databricks/officeqa"
  huggingface_dataset: "databricks/officeqa"
  raw_dir: "data/raw"
  eval_csv: "data/raw/officeqa_full.csv"
  reports_dir: "data/raw/reports"
  indices_dir: "data/indices"
  results_dir: "data/results"
  # Index recent Treasury reports (2020–2025 supports 15 eval questions)
  years: [2020, 2021, 2022, 2023, 2024, 2025]
  document_format: "text"  # markdown | text | json

baseline:
  chunk_size: 512
  chunk_overlap: 50
  tokenizer: "tiktoken:cl100k_base"
  chunk_strategy: "fixed"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  vector_db: "chroma"
  collection_name: "treasury_baseline"
  top_k: 5
  metadata_filtering: false
  embed_batch_size: 128
  chroma_batch_size: 512

engineered:
  chunk_size: 512
  chunk_overlap: 80
  tokenizer: "tiktoken:cl100k_base"
  chunk_strategy: "heading_aware_recursive"
  embedding_model: "BAAI/bge-large-en-v1.5"
  vector_db: "chroma"
  collection_name: "treasury_engineered"
  top_k: 5
  metadata_filtering: true
  hybrid_search: true
  bm25_weight: 0.4
  vector_weight: 0.6
  query_expansion: true
  reranking: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  context_compression: true
  retrieve_candidates: 30
  embed_batch_size: 64
  chroma_batch_size: 512

llm:
  provider: "ollama"
  model: "mistral"
  base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 512

tools:
  enabled: true
  use_bulletin_loader: true
  fx_provider: "frankfurter"  # frankfurter | exchangerate.host

evaluation:
  top_k: 5
  factual_tolerance: 0.01  # ±1%
  max_eval_samples: 15

prompts:
  baseline: |
    You are a U.S. Treasury financial analyst. Answer using ONLY the retrieved context below.

    Rules:
    - Put ONLY your final answer inside tags: <FINAL_ANSWER>value</FINAL_ANSWER>
    - Use a concise number, percentage, dollar amount, or short phrase from the context.
    - Do not include explanations inside the tags.
    - If the context does not contain enough information, give your best numeric estimate from the available values.

    Context:
    {context}

    Question: {question}

    <FINAL_ANSWER></FINAL_ANSWER>

  engineered: |
    You are a U.S. Treasury financial analyst. Use retrieved evidence and TOOL OUTPUTS only.

    STRICT OUTPUT RULES (must follow exactly):
    - Reply with EXACTLY one line and nothing else.
    - Format: <FINAL_ANSWER>value</FINAL_ANSWER>
    - No explanations, bullet points, or reasoning.
    - Do NOT use hedging language (assume, estimate, unfortunately, cannot determine).
    - Prefer exact tool-computed values when TOOL OUTPUTS provide them.
    - Use only numbers and facts from the evidence or tools. Never invent values.
    - Treasury Bulletins are quarterly (March=_03, June=_06, September=_09, December=_12).
    - Values marked [In thousands of dollars] must be multiplied by 1,000 for dollar amounts.
    - For "absolute" percent change, report the absolute value without a sign.
    - If evidence and tools lack the answer, reply exactly:
      <FINAL_ANSWER>Unable to determine from the provided documents.</FINAL_ANSWER>

    Retrieved Evidence:
    {context}

    TOOL OUTPUTS:
    {tool_outputs}

    Question: {question}

    Reply with one line only:
